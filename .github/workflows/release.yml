name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag/name, for example v1.3.1"
        required: true
        type: string
      replace_existing_assets:
        description: "Type REPLACE to replace all assets on an existing release"
        required: false
        type: string
      replacement_reason:
        description: "Required reason when replacing existing assets"
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-sign-release:
    name: Build, sign, attest, and publish release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Could not determine release version. Push a v* tag or provide the manual workflow version input."
          }

          if ($version -match "-test") {
            throw "Release version must not contain '-test': $version"
          }

          if ($version -notmatch "^v\d+\.\d+\.\d+$") {
            throw "Release version must look like v1.3.1. Received: $version"
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ARTIFACT_DIR=artifacts" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SKIP_EXISTING_RELEASE=false" | Out-File -FilePath $env:GITHUB_ENV -Append
          "REPLACEMENT_MODE=false" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Check existing release policy
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $replace = "${{ github.event.inputs.replace_existing_assets }}"
          $reason = "${{ github.event.inputs.replacement_reason }}"
          $isDispatch = "${{ github.event_name }}" -eq "workflow_dispatch"
          gh release view $env:RELEASE_VERSION *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists -and -not $isDispatch) {
            Write-Host "Existing release detected for $env:RELEASE_VERSION."
            Write-Host "No release assets were modified."
            Write-Host "Use workflow_dispatch replacement mode to replace existing assets."
            "SKIP_EXISTING_RELEASE=true" | Out-File -FilePath $env:GITHUB_ENV -Append
            exit 0
          }

          if ($releaseExists) {
            if ($replace -ne "REPLACE" -or [string]::IsNullOrWhiteSpace($reason)) {
              throw "Existing release replacement requires replace_existing_assets=REPLACE and a non-empty replacement_reason."
            }

            Write-Host "Existing release replacement mode confirmed for $env:RELEASE_VERSION."
            Write-Host "Replacement reason: $reason"
            "REPLACEMENT_MODE=true" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Build package directories
        if: env.SKIP_EXISTING_RELEASE != 'true'
        shell: pwsh
        run: |
          .\scripts\package-release.ps1 -Version $env:RELEASE_VERSION -Runtime win-x64 -Configuration Release -ReleaseRoot .\artifacts

      - name: Authenticode-sign app binaries
        if: env.SKIP_EXISTING_RELEASE != 'true'
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_BASE64)) {
            Write-Warning "Skipping Authenticode signing because WINDOWS_SIGNING_CERTIFICATE_BASE64 is not set."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD)) {
            Write-Warning "Skipping Authenticode signing because WINDOWS_SIGNING_CERTIFICATE_PASSWORD is not set."
            exit 0
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-code-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERTIFICATE_BASE64))

          $signTool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -like "*\x64\signtool.exe" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if ([string]::IsNullOrWhiteSpace($signTool)) {
            throw "Could not find signtool.exe on the Windows runner."
          }

          $packageDirs = Get-ChildItem -Path $env:ARTIFACT_DIR -Directory -Filter "PimaxVrcSupervisor-$env:RELEASE_VERSION-win-x64-*"
          $files = $packageDirs |
            ForEach-Object { Get-ChildItem -Path $_.FullName -Recurse -File -Include "PimaxVrcSupervisor*.exe", "PimaxVrcSupervisor*.dll" }

          if ($files.Count -eq 0) {
            throw "No app binaries were found to sign."
          }

          foreach ($file in $files) {
            & $signTool sign /f $certificatePath /p $env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $file.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Signing failed for $($file.FullName)."
            }

            & $signTool verify /pa /all $file.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Signature verification failed for $($file.FullName)."
            }
          }

          Remove-Item -LiteralPath $certificatePath -Force

      - name: Recreate zips after binary signing
        if: env.SKIP_EXISTING_RELEASE != 'true'
        shell: pwsh
        run: |
          $packageDirs = @(
            Join-Path $env:ARTIFACT_DIR "PimaxVrcSupervisor-$env:RELEASE_VERSION-win-x64-with-dotnet9"
            Join-Path $env:ARTIFACT_DIR "PimaxVrcSupervisor-$env:RELEASE_VERSION-win-x64-no-dotnet9"
          )

          foreach ($dir in $packageDirs) {
            if (-not (Test-Path -LiteralPath $dir)) {
              throw "Missing package directory: $dir"
            }

            $zip = "$dir.zip"
            if (Test-Path -LiteralPath $zip) {
              Remove-Item -LiteralPath $zip -Force
            }

            Compress-Archive -Path (Join-Path $dir "*") -DestinationPath $zip -CompressionLevel Optimal
          }

      - name: Verify package inventories
        if: env.SKIP_EXISTING_RELEASE != 'true'
        shell: pwsh
        run: |
          $required = @(
            "PimaxVrcSupervisor.exe",
            "PimaxVrcSupervisorConfigurator.exe",
            "PimaxVrcSupervisorSteamVrHost.exe",
            "PimaxVrcSupervisorTui.exe",
            "PimaxVrcSupervisorStartupHelper.exe",
            "PimaxVrcSupervisorWatcher.exe",
            "supervisor.config.json",
            "README.md",
            "RELEASE_NOTES.md",
            "Assets/vr-overlay-icon.png"
          )

          $zips = @(
            Join-Path $env:ARTIFACT_DIR "PimaxVrcSupervisor-$env:RELEASE_VERSION-win-x64-with-dotnet9.zip"
            Join-Path $env:ARTIFACT_DIR "PimaxVrcSupervisor-$env:RELEASE_VERSION-win-x64-no-dotnet9.zip"
          )

          foreach ($zip in $zips) {
            if (-not (Test-Path -LiteralPath $zip)) {
              throw "Missing zip: $zip"
            }

            $entries = @(tar -tf $zip)
            foreach ($file in $required) {
              if ($entries -notcontains $file) {
                throw "Missing required package file in $zip`: $file"
              }
            }

            if ($entries | Select-String "1\.3\.0-test|v1\.3\.0-test") {
              throw "Stale test name found in $zip."
            }

            if ($entries | Select-String '(^|/)(cs|de|es|fr|it|ja|ko|pl|pt-BR|ru|tr|zh-Hans|zh-Hant)/') {
              throw "Satellite culture folder found in $zip."
            }
          }

      - name: Create SHA256 checksums
        if: env.SKIP_EXISTING_RELEASE != 'true'
        shell: pwsh
        run: |
          $zips = Get-ChildItem -Path $env:ARTIFACT_DIR -Filter "PimaxVrcSupervisor-$env:RELEASE_VERSION-win-x64-*.zip" -File
          if ($zips.Count -ne 2) {
            throw "Expected exactly two release zips, found $($zips.Count)."
          }

          foreach ($zip in $zips) {
            $checksumPath = "$($zip.FullName).sha256"
            $hash = (Get-FileHash -Path $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($zip.Name)" | Out-File -FilePath $checksumPath -Encoding ascii
          }

      - name: Install cosign
        if: env.SKIP_EXISTING_RELEASE != 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sigstore-sign release zips
        if: env.SKIP_EXISTING_RELEASE != 'true'
        shell: pwsh
        run: |
          $zips = Get-ChildItem -Path $env:ARTIFACT_DIR -Filter "PimaxVrcSupervisor-$env:RELEASE_VERSION-win-x64-*.zip" -File
          foreach ($zip in $zips) {
            $bundlePath = "$($zip.FullName).sigstore.json"
            cosign sign-blob --yes --bundle $bundlePath $zip.FullName

            cosign verify-blob $zip.FullName `
              --bundle $bundlePath `
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/(heads|tags)/.+$" `
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          }

      - name: Attest release zips
        if: env.SKIP_EXISTING_RELEASE != 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/PimaxVrcSupervisor-${{ env.RELEASE_VERSION }}-win-x64-*.zip

      - name: Create or update draft GitHub release
        if: env.SKIP_EXISTING_RELEASE != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseFiles = @(
            Get-ChildItem -Path $env:ARTIFACT_DIR -Filter "PimaxVrcSupervisor-$env:RELEASE_VERSION-win-x64-*.zip" -File
            Get-ChildItem -Path $env:ARTIFACT_DIR -Filter "PimaxVrcSupervisor-$env:RELEASE_VERSION-win-x64-*.zip.sha256" -File
            Get-ChildItem -Path $env:ARTIFACT_DIR -Filter "PimaxVrcSupervisor-$env:RELEASE_VERSION-win-x64-*.zip.sigstore.json" -File
          ) | ForEach-Object { $_.FullName }

          if ($releaseFiles.Count -ne 6) {
            throw "Expected 6 release upload files, found $($releaseFiles.Count)."
          }

          gh release view $env:RELEASE_VERSION *> $null
          if ($LASTEXITCODE -eq 0) {
            if ($env:REPLACEMENT_MODE -ne "true") {
              throw "Existing release detected outside replacement mode. No release assets were modified."
            }

            gh release upload $env:RELEASE_VERSION @releaseFiles --clobber
            $releaseNotes = Get-Content -LiteralPath .\RELEASE_NOTES.md -Raw
            gh release edit $env:RELEASE_VERSION --notes "$releaseNotes"
          } else {
            gh release create $env:RELEASE_VERSION @releaseFiles --title "Pimax VRC Supervisor $env:RELEASE_VERSION" --notes-file RELEASE_NOTES.md --draft --target $env:GITHUB_SHA
          }
